<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PromptAtelier - 智能提示词工作台</title>
    <!-- Tailwind CSS & DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.4.19/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
    <!-- Chart.js for radar chart -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <!-- html2canvas for GIF/video export (本地优先，CDN fallback) -->
    <script src="/lib/html2canvas.min.js"></script>
    <!-- html2canvas 备用 CDN -->
    <script>
      if (!window.html2canvas) {
        document.write('<scr'+'ipt src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"><\/scr'+'ipt>');
      }
    </script>
    <script>
      if (!window.html2canvas) {
        document.write('<scr'+'ipt src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"><\/scr'+'ipt>');
      }
    </script>
    <!-- gif.js for animated GIF export (served locally) -->
    <script src="gif.js"></script>
    <!-- 验证导出库加载状态 -->
    <script>
      window.addEventListener('DOMContentLoaded', function() {
        if (!window.html2canvas) console.warn('[PromptAtelier] html2canvas 加载失败，GIF/视频导出功能不可用');
        if (!window.GIF) console.warn('[PromptAtelier] gif.js 加载失败，GIF 导出功能不可用');
        if (window.html2canvas && window.GIF) console.log('[PromptAtelier] 导出库加载成功 ✓');
      });
    </script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@0.312.0/dist/umd/lucide.min.js"></script>
    <!-- i18n Language Packs -->
    <script>window.i18nData = {};</script>
    <script src="locales/zh.js"></script>
    <script src="locales/en.js"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body x-data="promptAtelierApp()" x-effect="document.title = $store.i18n.t('brand.name') + ' - ' + $store.i18n.t('brand.slogan')">

    <!-- ========================== -->
    <!-- Zen Workspace Layout -->
    <!-- ========================== -->
    <div class="zen-workspace">

        <!-- Zen Sidebar Navigation -->
        <nav class="zen-sidebar">
            <!-- Brand Logo + Name -->
            <div class="zen-sidebar-brand" @click="activeTab = 'design'">
                <div class="brand-icon"><i data-lucide="sparkles"></i></div>
                <span class="brand-text" x-text="$store.i18n.t('brand.name')">PromptAtelier</span>
            </div>

            <div class="zen-sidebar-nav">
                <!-- Top: Main Navigation -->
                <div class="zen-sidebar-nav-top">
                    <button class="zen-nav-btn" :class="{'active': activeTab === 'design'}" @click="activeTab = 'design'; selectedDesignPreset = null" :title="$store.i18n.t('nav.design')">
                        <i data-lucide="palette"></i>
                        <span class="zen-nav-label" x-text="$store.i18n.t('nav.design')"></span>
                    </button>
                    <button class="zen-nav-btn" :class="{'active': activeTab === 'skills'}" @click="activeTab = 'skills'; loadSkills()" :title="$store.i18n.t('nav.skills')">
                        <i data-lucide="brain"></i>
                        <span class="zen-nav-label" x-text="$store.i18n.t('nav.skills')"></span>
                    </button>
                    <button class="zen-nav-btn" :class="{'active': activeTab === 'dynamic'}" @click="activeTab = 'dynamic'" :title="$store.i18n.t('nav.dynamic')">
                        <i data-lucide="clapperboard"></i>
                        <span class="zen-nav-label" x-text="$store.i18n.t('nav.dynamic')"></span>
                    </button>
                    <button class="zen-nav-btn" :class="{'active': activeTab === 'aiManage'}" @click="activeTab = 'aiManage'; startModelStatusPolling(); loadSafetyStats()" :title="$store.i18n.t('nav.ai')">
                        <i data-lucide="cpu"></i>
                        <span class="zen-nav-label" x-text="$store.i18n.t('nav.ai')"></span>
                    </button>
                </div>

                <div class="zen-sidebar-divider"></div>

                <!-- Bottom: Utilities -->
                <div class="zen-sidebar-nav-bottom">
                    <button class="zen-nav-btn" @click="historyDropdownOpen = !historyDropdownOpen; if(historyDropdownOpen) loadHistory()" :title="$store.i18n.t('nav.history')">
                        <i data-lucide="history"></i>
                        <span class="zen-nav-label" x-text="$store.i18n.t('nav.history')"></span>
                    </button>
                    <button class="zen-nav-btn" @click="favoritesDropdownOpen = !favoritesDropdownOpen; if(favoritesDropdownOpen) loadFavorites()" :title="$store.i18n.t('nav.favorites')">
                        <i data-lucide="star"></i>
                        <span class="zen-nav-label" x-text="$store.i18n.t('nav.favorites')"></span>
                    </button>

                    <div class="zen-sidebar-divider"></div>

                    <button class="zen-nav-btn" @click="$store.i18n.toggle()" :title="$store.i18n.locale === 'zh' ? 'English' : '中文'">
                        <i data-lucide="languages"></i>
                        <span class="zen-nav-label" x-text="$store.i18n.locale === 'zh' ? 'English' : '中文'"></span>
                    </button>
                    <button class="zen-nav-btn" @click="toggleTheme" :title="theme === 'dark' ? 'Light' : 'Dark'">
                        <template x-if="theme === 'dark'"><i data-lucide="sun"></i></template>
                        <template x-if="theme !== 'dark'"><i data-lucide="moon"></i></template>
                        <span class="zen-nav-label" x-text="$store.i18n.t('nav.theme')"></span>
                    </button>
                    <button class="zen-nav-btn" @click="showSettings = true" :title="$store.i18n.t('nav.settings')">
                        <i data-lucide="settings"></i>
                        <span class="zen-nav-label" x-text="$store.i18n.t('nav.settings')"></span>
                    </button>

                    <!-- AI Status Indicator -->
                    <div class="zen-nav-btn" style="cursor:default;pointer-events:none;opacity:0.7">
                        <div class="zen-ai-status" :class="isLocalModelReady ? 'ready' : 'offline'"></div>
                        <span class="zen-nav-label text-xs" x-text="isLocalModelReady ? $store.i18n.t('nav.aiReady') : $store.i18n.t('nav.aiNotReady')"></span>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Main Content Area -->
        <div class="zen-main">

        <!-- ========================== -->
        <!-- Tab 1: 设计助手（两级交互） -->
        <!-- ========================== -->
        <div x-show="activeTab === 'design'"
             class="zen-tab-panel zen-tab-full">

            <!-- ===== 第一级：选择设计类型（全宽 Bento）===== -->
            <div x-show="!selectedDesignPreset" class="design-level1">
                <div class="design-level1-header">
                    <h2 class="zen-section-title" style="font-size:1.35rem;margin-bottom:4px">
                        <i data-lucide="palette" class="lucide-lg"></i>
                        <span x-text="$store.i18n.t('design.selectType')"></span>
                    </h2>
                    <p class="zen-section-subtitle" x-text="$store.i18n.t('design.subtitle')"></p>
                </div>

                <!-- 加载态 -->
                <div x-show="designPresets.length === 0" class="flex items-center justify-center py-16 opacity-50">
                    <span class="loading loading-spinner loading-lg text-primary mr-3"></span>
                    <span x-text="$store.i18n.t('design.loadingPresets')"></span>
                </div>

                <!-- Bento 网格（飞纸动画） -->
                <div class="design-bento-grid">
                    <template x-for="(preset, index) in designPresets" :key="preset.id">
                        <div class="design-bento-item"
                             :style="'animation-delay:' + (index * 60) + 'ms'"
                             @click="selectDesignPreset(preset)">
                            <span class="design-bento-icon" x-text="preset.icon"></span>
                            <span class="design-bento-name" x-text="preset.name"></span>
                            <span class="design-bento-desc" x-text="preset.description || ''"></span>
                        </div>
                    </template>
                </div>
            </div>

            <!-- ===== 第二级：设计表单 + 生成结果 ===== -->
            <div x-show="selectedDesignPreset" x-transition class="design-level2">

                <!-- 返回按钮 -->
                <div class="design-level2-topbar">
                    <button class="btn btn-ghost btn-sm gap-1" @click="selectedDesignPreset = null; designResult = null" :title="$store.i18n.t('actions.back')">
                        <i data-lucide="arrow-left" class="lucide-sm"></i>
                        <span x-text="$store.i18n.t('actions.back')"></span>
                    </button>
                    <h2 class="design-level2-title">
                        <span x-text="selectedDesignPreset?.icon"></span>
                        <span x-text="selectedDesignPreset?.name"></span>
                    </h2>
                    <div class="flex-1"></div>
                    <!-- 压缩开关 -->
                    <label class="flex items-center gap-2 cursor-pointer mr-3">
                        <input type="checkbox" class="toggle toggle-sm toggle-primary"
                               x-model="settings.enableCompression"
                               @change="localStorage.setItem('atelier_settings', JSON.stringify(settings))" />
                        <span class="text-xs" x-text="settings.enableCompression ? $store.i18n.t('design.compressionOn') : $store.i18n.t('design.compression')"></span>
                    </label>
                    <button class="btn btn-primary btn-sm gap-2"
                            @click="generateDesignPrompt"
                            :disabled="designLoading"
                            :title="$store.i18n.t('actions.generate')">
                        <span x-show="designLoading" class="loading loading-spinner loading-xs"></span>
                        <i x-show="!designLoading" data-lucide="sparkles" class="lucide-sm"></i>
                        <span x-text="designLoading ? $store.i18n.t('actions.generating') : $store.i18n.t('actions.generate')"></span>
                    </button>
                </div>

                <!-- 上半区：表单 -->
                <div class="design-form-area">
                    <div class="design-form-grid">
                        <!-- 动态变量字段 -->
                        <template x-for="variable in selectedDesignPreset?.template?.variables || []" :key="variable.name">
                            <div class="form-control">
                                <label class="label py-1">
                                    <span class="label-text text-sm font-medium">
                                        <span x-text="variable.description"></span>
                                        <span x-show="variable.required" class="text-error ml-1">*</span>
                                    </span>
                                </label>
                                <template x-if="variable.type === 'string'">
                                    <input type="text" class="input input-bordered input-sm w-full"
                                           :placeholder="variable.description"
                                           x-model="designVariables[variable.name]">
                                </template>
                                <template x-if="variable.type === 'enum'">
                                    <select class="select select-bordered select-sm w-full" x-model="designVariables[variable.name]" :title="variable.description">
                                        <option value="" x-text="$store.i18n.t('actions.search') + '...'"></option>
                                        <template x-for="option in variable.options" :key="option">
                                            <option :value="option" x-text="option"></option>
                                        </template>
                                    </select>
                                </template>
                            </div>
                        </template>

                        <!-- 补充说明 -->
                        <div class="form-control">
                            <label class="label py-1">
                                <span class="label-text text-sm font-medium">
                                    <i data-lucide="lightbulb" class="lucide-inline-sm mr-1"></i>
                                    <span x-text="$store.i18n.t('design.additionalInput')"></span>
                                </span>
                            </label>
                            <textarea class="textarea textarea-bordered textarea-sm w-full" rows="2"
                                      :placeholder="$store.i18n.t('design.additionalPlaceholder')"
                                      x-model="designAdditionalInput"></textarea>
                        </div>

                        <!-- 风格参考（内联在表单网格中） -->
                        <div class="form-control" x-show="availableReferences.length > 0">
                            <label class="label py-1">
                                <span class="label-text text-sm font-medium">
                                    <i data-lucide="sparkles" class="lucide-inline-sm mr-1"></i>
                                    <span x-text="$store.i18n.t('design.styleReference')"></span>
                                </span>
                            </label>
                            <div x-show="!selectedReference">
                                <select class="select select-bordered select-sm w-full" @change="selectReferenceById($event.target.value)" :title="$store.i18n.t('design.styleReference')">
                                    <option value="" x-text="$store.i18n.t('design.selectReference')"></option>
                                    <template x-for="fav in availableReferences" :key="fav.id">
                                        <option :value="fav.id" x-text="fav.name + ' ' + '★'.repeat(fav.rating || 0)"></option>
                                    </template>
                                </select>
                            </div>
                            <div x-show="selectedReference" class="flex items-center gap-2 p-2 bg-primary/10 rounded-lg border border-primary/30">
                                <span class="text-lg" x-text="getCategoryIcon(selectedReference?.subcategory)"></span>
                                <p class="flex-1 font-medium text-xs truncate" x-text="selectedReference?.name"></p>
                                <button type="button" class="btn btn-ghost btn-xs btn-circle" @click="clearReference()" :title="$store.i18n.t('actions.clear')">✕</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 下半区：生成结果 -->
                <div class="design-result-area">
                    <!-- 空态 -->
                    <div x-show="!designResult" class="design-result-empty">
                        <i data-lucide="image-plus" class="lucide-xxl"></i>
                        <p x-text="$store.i18n.t('design.emptyResult')"></p>
                    </div>

                    <!-- 结果双栏 -->
                    <div x-show="designResult" class="design-result-grid">
                        <!-- 左栏：最终提示词 -->
                        <div class="design-result-card result-highlight">
                            <div class="flex justify-between items-center mb-2">
                                <span class="badge badge-primary gap-1">
                                    <i data-lucide="sparkles" class="lucide-xs"></i>
                                    <span x-text="$store.i18n.t('design.finalPrompt')"></span>
                                </span>
                                <button class="btn btn-primary btn-xs gap-1" @click="copyToClipboard(designResult?.finalPrompt)" :title="$store.i18n.t('actions.copy')">
                                    <i data-lucide="copy" class="lucide-xs"></i>
                                    <span x-text="$store.i18n.t('actions.copy')"></span>
                                </button>
                            </div>
                            <div class="prose prose-sm max-w-none whitespace-pre-wrap p-3 rounded-lg bg-surface-2 text-sm"
                                 x-text="designResult?.finalPrompt"></div>

                            <!-- 匹配技能 & 推荐关键词 -->
                            <div x-show="designResult?.matchedSkills?.length > 0" class="mt-3">
                                <h4 class="text-xs font-medium mb-1 flex items-center gap-1 opacity-70">
                                    <i data-lucide="brain" class="lucide-xs lucide-brand2"></i>
                                    <span x-text="$store.i18n.t('design.matchedSkills')"></span>
                                </h4>
                                <div class="flex flex-wrap gap-1">
                                    <template x-for="s in designResult?.matchedSkills || []" :key="s">
                                        <span class="badge badge-primary text-xs" x-text="s"></span>
                                    </template>
                                </div>
                            </div>
                            <div x-show="designResult?.keywords?.length > 0" class="mt-2">
                                <div class="flex flex-wrap gap-1">
                                    <template x-for="kw in designResult?.keywords || []" :key="kw">
                                        <span class="badge badge-ghost text-xs cursor-pointer hover:badge-primary" @click="copyToClipboard(kw)" x-text="kw"></span>
                                    </template>
                                </div>
                            </div>
                        </div>

                        <!-- 右栏：结构化提示词 -->
                        <div class="design-result-card glass-card">
                            <div class="flex justify-between items-center mb-2">
                                <span class="badge badge-ghost gap-1">
                                    <i data-lucide="file-text" class="lucide-xs"></i>
                                    <span x-text="$store.i18n.t('design.structuredPrompt')"></span>
                                </span>
                                <button class="btn btn-ghost btn-xs gap-1" @click="copyToClipboard(designResult?.structuredPrompt)" :title="$store.i18n.t('actions.copy')">
                                    <i data-lucide="copy" class="lucide-xs"></i>
                                </button>
                            </div>
                            <div class="prose prose-sm max-w-none whitespace-pre-wrap p-3 rounded-lg bg-surface-3 text-sm"
                                 x-text="designResult?.structuredPrompt"></div>

                            <!-- 输出建议 -->
                            <div x-show="designResult?.tips?.length > 0" class="mt-3">
                                <h4 class="text-xs font-medium mb-1 flex items-center gap-1 opacity-70">
                                    <i data-lucide="lightbulb" class="lucide-xs lucide-accent"></i>
                                    <span x-text="$store.i18n.t('design.tips')"></span>
                                </h4>
                                <ul class="text-xs space-y-1 opacity-70">
                                    <template x-for="tip in designResult?.tips || []" :key="tip">
                                        <li x-text="tip"></li>
                                    </template>
                                </ul>
                            </div>

                            <!-- 压缩统计 -->
                            <div x-show="designResult?.compressionApplied" class="mt-3 flex items-center gap-2 text-xs">
                                <i data-lucide="zap" class="lucide-xs lucide-success"></i>
                                <span x-text="(designResult?.tokenEstimate?.originalTokens||0)+' → '+(designResult?.tokenEstimate?.compressedTokens||0)+' tokens'"></span>
                                <span class="badge badge-sm badge-success-soft">
                                    -<span x-text="designResult?.tokenEstimate?.ratio || 0"></span>%
                                </span>
                            </div>
                        </div>
                    </div>

                    <!-- 操作按钮组（右下角） -->
                    <div x-show="designResult" class="design-result-actions">
                        <button class="btn btn-ghost btn-sm gap-1" @click="copyToClipboard(designResult?.finalPrompt)" :title="$store.i18n.t('actions.copyPrompt')">
                            <i data-lucide="copy" class="lucide-sm"></i>
                            <span x-text="$store.i18n.t('actions.copyPrompt')"></span>
                        </button>
                        <button class="btn btn-sm btn-brand-secondary gap-1"
                                @click="openFavoriteModal()"
                                :class="{'opacity-50 pointer-events-none': currentHistoryRecord?.isFavorited}"
                                :title="$store.i18n.t('actions.favorite')">
                            <i data-lucide="star" class="lucide-sm"></i>
                            <span x-show="!currentHistoryRecord?.isFavorited" x-text="$store.i18n.t('actions.favorite')"></span>
                            <span x-show="currentHistoryRecord?.isFavorited" x-text="$store.i18n.t('actions.favorited')"></span>
                        </button>
                        <button class="btn btn-primary btn-sm gap-1" @click="regenerateDesignPrompt" :title="$store.i18n.t('actions.regenerate')">
                            <i data-lucide="refresh-cw" class="lucide-sm"></i>
                            <span x-text="$store.i18n.t('actions.regenerate')"></span>
                        </button>
                        <button x-show="isDynamicDesignSupported()" class="btn btn-sm btn-brand-accent gap-1"
                                @click="sendToMotionDesign()" :title="$store.i18n.t('design.generateDynamic')">
                            <i data-lucide="clapperboard" class="lucide-sm"></i>
                            <span x-text="$store.i18n.t('design.generateDynamic')"></span>
                        </button>
                    </div>
                </div><!-- /结果区 -->

            </div><!-- /第二级 -->

        </div><!-- /Tab 1 -->

        <!-- ========================== -->
        <!-- Tab 2: Skills 专业技能 -->
        <!-- ========================== -->
        <div x-show="activeTab === 'skills'" x-transition:enter="transition ease-out duration-300" class="zen-tab-full">
            
            <div class="text-center mb-8">
                <h1 class="text-4xl font-bold text-primary mb-2" x-text="$store.i18n.t('skills.title')"></h1>
                <p class="text-lg opacity-75" x-text="$store.i18n.t('skills.subtitle')"></p>
            </div>

            <!-- Skills Stats -->
            <div class="stats shadow mb-6 w-full">
                <div class="stat">
                    <div class="stat-figure text-primary">
                        <span class="text-3xl">🧠</span>
                    </div>
                    <div class="stat-title" x-text="$store.i18n.t('skills.totalSkills')"></div>
                    <div class="stat-value text-primary" x-text="skills.length"></div>
                </div>
                <div class="stat">
                    <div class="stat-figure text-success">
                        <span class="text-3xl">✅</span>
                    </div>
                    <div class="stat-title" x-text="$store.i18n.t('skills.enabled')"></div>
                    <div class="stat-value text-success" x-text="skills.filter(s => s.enabled).length"></div>
                </div>
                <div class="stat">
                    <div class="stat-figure text-secondary">
                        <span class="text-3xl">🏷️</span>
                    </div>
                    <div class="stat-title" x-text="$store.i18n.t('skills.totalTriggers')"></div>
                    <div class="stat-value text-secondary" x-text="skills.reduce((sum, s) => sum + (s.triggers?.length || 0), 0)"></div>
                </div>
            </div>

            <!-- Actions Bar -->
            <div class="flex justify-between items-center mb-6">
                <div class="flex gap-2">
                    <button class="btn btn-primary btn-sm gap-2" @click="showCreateSkillModal = true">
                        <span>➕</span> <span x-text="$store.i18n.t('skills.createNew')"></span>
                    </button>
                    <label class="btn btn-outline btn-sm gap-2">
                        <span>📥</span> <span x-text="$store.i18n.t('skills.importJson')"></span>
                        <input type="file" class="hidden" accept=".json" @change="importSkillFromFile($event)" />
                    </label>
                    <button class="btn btn-outline btn-sm gap-2" @click="rescanSkills" :disabled="skillsLoading">
                        <span x-show="!skillsLoading">🔄</span>
                        <span x-show="skillsLoading" class="loading loading-spinner loading-xs"></span>
                        <span x-text="$store.i18n.t('skills.rescan')"></span>
                    </button>
                </div>
                <div class="form-control">
                    <input type="text" :placeholder="'🔍 ' + $store.i18n.t('skills.searchPlaceholder')" class="input input-bordered input-sm w-64"
                           x-model="skillSearch" />
                </div>
            </div>

            <!-- Skills Grid -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <template x-for="skill in filteredSkills" :key="skill.id">
                    <div class="card bg-base-100 shadow-lg hover:shadow-xl transition-all duration-300"
                         :class="{'border-2 border-success': skill.enabled, 'opacity-60': !skill.enabled}">
                        <div class="card-body p-5">
                            <!-- Header -->
                            <div class="flex justify-between items-start">
                                <div class="flex items-center gap-3">
                                    <div class="avatar placeholder">
                                        <div class="bg-primary text-primary-content rounded-full w-12">
                                            <span class="text-xl">🧠</span>
                                        </div>
                                    </div>
                                    <div>
                                        <h3 class="card-title text-base" x-text="skill.name"></h3>
                                        <p class="text-xs opacity-50" x-text="'v' + skill.version"></p>
                                    </div>
                                </div>
                                <input type="checkbox" class="toggle toggle-success toggle-sm" 
                                       :checked="skill.enabled"
                                       @change="toggleSkill(skill.id, $event.target.checked)" />
                            </div>

                            <!-- Description -->
                            <p class="text-sm opacity-75 mt-2 line-clamp-2" x-text="skill.description"></p>

                            <!-- Triggers -->
                            <div class="mt-3">
                                <p class="text-xs font-medium mb-1 opacity-60">🎯 <span x-text="$store.i18n.t('skills.triggers')"></span></p>
                                <div class="flex flex-wrap gap-1">
                                    <template x-for="trigger in skill.triggers?.slice(0, 4)" :key="trigger">
                                        <span class="badge badge-outline badge-xs" x-text="trigger"></span>
                                    </template>

    <!-- i18n Alpine Store + Lucide Init (must load before script.js) -->
    <script>
      // Register i18n Alpine.js Store
      document.addEventListener('alpine:init', () => {
        Alpine.store('i18n', {
          locale: localStorage.getItem('atelier_lang') || 'zh',
          
          // 使用 getter 返回翻译函数，确保 Alpine 追踪 locale 变化
          get t() {
            const locale = this.locale;  // Alpine 响应式追踪点
            const data = window.i18nData?.[locale];
            return (key) => {
              if (!data) return key;
              return key.split('.').reduce((obj, k) => obj?.[k], data) || key;
            };
          },
          
          toggle() {
            this.locale = this.locale === 'zh' ? 'en' : 'zh';
            localStorage.setItem('atelier_lang', this.locale);
            document.documentElement.lang = this.locale === 'zh' ? 'zh-CN' : 'en';
            console.log('[i18n] 语言切换:', this.locale);
            // Re-render Lucide icons after language change
            if (window.lucide) {
              requestAnimationFrame(() => lucide.createIcons());
            }
          },

          setLocale(lang) {
            if (window.i18nData?.[lang]) {
              this.locale = lang;
              localStorage.setItem('atelier_lang', this.locale);
              document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
            }
          }
        });
      });

      // Initialize Lucide Icons after DOM ready
      document.addEventListener('DOMContentLoaded', () => {
        if (window.lucide) {
          lucide.createIcons();
          console.log('[PromptAtelier] Lucide Icons 初始化完成 ✓');
        } else {
          console.warn('[PromptAtelier] Lucide Icons 未加载');
        }
      });
    </script>
    <script src="script.js"></script>
</body>
</html>
